<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TMS Portal - Add Student</title>
  <link rel="icon" href="f.icon.webp.webp" type="image/x-icon">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], },
          colors: {
            primary: '#F16611', 'primary-dark': '#D95A0E', 'dark-bg': '#0D1117',
            'dark-card': '#161B22', 'dark-border': '#30363D',
          },
        },
      },
    };
  </script>

  <style>
    /* Custom Styles */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #30363D; border-radius: 3px; }
    body::before { /* Aurora Background */
        content: ''; position: absolute; inset: 0;
        background-image: radial-gradient(circle at 15% 15%, #F1661120 0%, transparent 25%),
                          radial-gradient(circle at 85% 75%, #4f46e520 0%, transparent 25%);
        filter: blur(60px); z-index: -1; animation: subtle-move 20s infinite alternate;
    }
    @keyframes subtle-move { from { transform: translate(0, 0); } to { transform: translate(20px, -30px); } }
    #manage-users-btn[aria-expanded="true"] #arrow-icon { transform: rotate(180deg); }
    #arrow-icon { transition: transform 0.2s ease-in-out; }
  </style>
</head>

<body class="font-sans bg-dark-bg text-gray-300 overflow-x-hidden">
  <div class="relative min-h-screen md:flex">
    
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-30 md:hidden hidden"></div>
    
    <!-- =========== ADMIN SIDEBAR START =========== -->
    <aside id="sidebar" class="w-64 flex-shrink-0 bg-dark-card/80 backdrop-blur-xl border-r border-dark-border flex-col
                             fixed inset-y-0 left-0 z-40 md:relative md:translate-x-0
                             transform -translate-x-full transition-transform duration-300 ease-in-out">
            <div class="h-20 flex items-center justify-between px-6 flex-shrink-0">
                <a href="#" class="flex items-center gap-3"><img src="logo.webp" alt="Logo"
                        class="w-10 rounded-full"><span class="text-xl text-white font-bold">TMS Admin</span></a>
                <button id="close-sidebar-btn" class="md:hidden text-gray-400 hover:text-white"><i data-lucide="x"
                        class="w-6 h-6"></i></button>
            </div>

            <nav class="flex-1 px-4 py-6 space-y-2">
                <a id="dashboard-link" href="admindashboard.html"
                    class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white rounded-lg transition-colors">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> Dashboard
                </a>
                <!-- Manage Users -->
                <div>
                    <button onclick="toggleDropdown('manage-users-panel', 'manage-users-icon')"
                        class="w-full flex justify-between items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white rounded-lg transition-colors">
                        <span class="flex items-center gap-3">
                            <i data-lucide="users" class="w-5 h-5"></i> Manage Users
                        </span>
                        <i id="manage-users-icon" data-lucide="chevron-down" class="w-5 h-5 transition-transform duration-200"></i>
                    </button>
                    <div id="manage-users-panel" class="pl-6 pt-2 space-y-1 hidden">
                        <a id="changeuser-link" href="changeuser.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Change
                            user</a>
                        <a id="adduser-link" href="manageusers.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Add
                            user</a>
                    </div>
                </div>

                <!-- Course Enrolments -->
                <div>
                    <button onclick="toggleDropdown('enrollment-panel', 'enrollment-icon')"
                        class="w-full flex justify-between items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white rounded-lg transition-colors">
                        <span class="flex items-center gap-3"><i data-lucide="bookmark" class="w-5 h-5"></i> Course
                            Enrolments</span>
                        <i id="enrollment-icon" data-lucide="chevron-down"
                            class="w-5 h-5 transition-transform duration-200"></i>
                    </button>
                    <div id="enrollment-panel" class="pl-6 pt-2 space-y-1 hidden">
                        <a href="changecourseenroll.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Change
                            enrolment</a>
                        <a href="addcourseenroll.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Add
                            enrolment</a>
                    </div>
                </div>

                <!-- Courses -->
                <div>
                    <button onclick="toggleDropdown('course-panel', 'course-icon')"
                        class="w-full flex justify-between items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white rounded-lg transition-colors">
                        <span class="flex items-center gap-3"><i data-lucide="book" class="w-5 h-5"></i> Courses</span>
                        <i id="course-icon" data-lucide="chevron-down"
                            class="w-5 h-5 transition-transform duration-200"></i>
                    </button>
                    <div id="course-panel" class="pl-6 pt-2 space-y-1 hidden">
                        <a href="changecourse.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Change
                            course</a>
                        <a href="addcourse.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Add
                            course</a>
                    </div>
                </div>

                <!-- Exams -->
                <div>
                    <button onclick="toggleDropdown('exam-panel', 'exam-icon')"
                        class="w-full flex justify-between items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white rounded-lg transition-colors">
                        <span class="flex items-center gap-3"><i data-lucide="file-text" class="w-5 h-5"></i>
                            Exams</span>
                        <i id="exam-icon" data-lucide="chevron-down"
                            class="w-5 h-5 transition-transform duration-200"></i>
                    </button>
                    <div id="exam-panel" class="pl-6 pt-2 space-y-1 hidden">
                        <a href="changexam.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Change
                            exam</a>
                        <a href="addexam.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Add
                            exam</a>
                    </div>
                </div>

                <!-- Students -->
                <div>
                    <button onclick="toggleDropdown('student-panel', 'student-icon')"
                        class="w-full flex justify-between items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-white rounded-lg transition-colors">
                        <span class="flex items-center gap-3"><i data-lucide="graduation-cap" class="w-5 h-5"></i>
                            Students</span>
                        <i id="student-icon" data-lucide="chevron-down"
                            class="w-5 h-5 transition-transform duration-200"></i>
                    </button>
                    <div id="student-panel" class="pl-6 pt-2 space-y-1 hidden">
                        <a href="changestudent.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Change
                            student</a>
                        <a href="addstudent.html"
                            class="flex items-center gap-3 px-4 py-2 text-sm text-gray-400 hover:text-white rounded-lg transition-colors">Add
                            student</a>
                    </div>
                </div>
            </nav>
            <div class="px-4 py-6"><a href="index.html"
                    class="flex items-center gap-3 px-4 py-2.5 text-gray-400 hover:text-red-400 rounded-lg transition-colors"><i
                        data-lucide="log-out" class="w-5 h-5"></i> Log Out</a></div>
        </aside>
    <!-- =========== ADMIN SIDEBAR END =========== -->

    <!-- =========== MAIN CONTENT START =========== -->
    <div class="flex-1 flex flex-col max-h-screen">
        <header class="h-20 flex-shrink-0 flex items-center justify-between px-4 sm:px-8 bg-dark-bg/60 backdrop-blur-xl border-b border-dark-border z-10">
            <div class="flex items-center gap-4">
                <button id="open-sidebar-btn" class="md:hidden text-gray-300 hover:text-white"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <h1 class="text-xl sm:text-2xl font-bold text-white">Add Student</h1>
            </div>
            <button class="flex items-center gap-3"><span class="hidden sm:inline text-sm font-semibold">Welcome, Admin</span><img src="https://i.postimg.cc/XJ8K3vZ7/user.png" class="w-10 h-10 rounded-full border-2 border-primary" alt="Admin Avatar"></button>
        </header>
        
        <main class="flex-1 overflow-y-auto p-4 sm:p-8">
             <div class="bg-dark-card/80 backdrop-blur-lg border border-dark-border rounded-2xl shadow-lg">
                
                <!-- Basic Information -->
                <fieldset class="p-6">
                    <div class="border-b border-dark-border pb-4 mb-6"><legend class="text-lg font-semibold text-white">Basic Information</legend></div>
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center"><label class="font-semibold text-gray-400 md:text-right">Serial number:</label><div class="md:col-span-3">-</div></div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label class="font-semibold text-gray-400 md:text-right">User:</label>
                            <div class="md:col-span-3">
                                <div class="flex items-center gap-3"><select class="w-full max-w-sm px-3 py-2 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"></select><a href="#" title="Add User" class="text-gray-400 hover:text-primary"><i data-lucide="plus-circle" class="w-5 h-5"></i></a></div>
                                <p class="text-xs text-gray-500 mt-2">Student ka login account</p>
                            </div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label for="name" class="font-semibold text-gray-400 md:text-right">Name:</label>
                            <div class="md:col-span-3"><input type="text" id="name" class="w-full max-w-sm py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label for="father-name" class="font-semibold text-gray-400 md:text-right">Father name:</label>
                            <div class="md:col-span-3"><input type="text" id="father-name" class="w-full max-w-sm py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label for="cnic" class="font-semibold text-gray-400 md:text-right">Cnic:</label>
                            <div class="md:col-span-3"><input type="text" id="cnic" class="w-full max-w-sm py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary" placeholder="XXXXX-XXXXXXX-X"></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label for="moodle-id" class="font-semibold text-gray-400 md:text-right">Moodle ID:</label>
                            <div class="md:col-span-3"><input type="text" id="moodle-id" class="w-full max-w-sm py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"></div>
                        </div>
                         <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-start">
                            <label for="profile-picture" class="font-semibold text-gray-400 md:text-right pt-2">Profile Picture:</label>
                            <div class="md:col-span-3"><input type="file" id="profile-picture" class="w-full max-w-sm text-sm text-gray-400 file:bg-dark-border file:text-white file:border-none file:rounded-md file:px-4 file:py-2 file:mr-4 file:cursor-pointer hover:file:bg-dark-border/70"></div>
                        </div>
                    </div>
                </fieldset>

                <!-- Contact Information (NEW SECTION) -->
                <fieldset class="p-6 border-t border-dark-border">
                    <div class="border-b border-dark-border pb-4 mb-6"><legend class="text-lg font-semibold text-white">Contact Information</legend></div>
                    <div class="space-y-6">
                        <!-- Email -->
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label for="email" class="font-semibold text-gray-400 md:text-right">Email:</label>
                            <div class="md:col-span-3"><input type="email" id="email" class="w-full max-w-sm py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"></div>
                        </div>
                        <!-- Contact Number -->
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label for="contact-number" class="font-semibold text-gray-400 md:text-right">Contact number:</label>
                            <div class="md:col-span-3"><input type="tel" id="contact-number" class="w-full max-w-sm py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"></div>
                        </div>
                        <!-- Address -->
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-start">
                            <label for="address" class="font-semibold text-gray-400 md:text-right pt-2">Address:</label>
                            <div class="md:col-span-3"><textarea id="address" rows="3" class="w-full max-w-sm py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"></textarea></div>
                        </div>
                    </div>
                </fieldset>

                 <!-- Dates and Status -->
                 <fieldset class="p-6 border-t border-dark-border">
                    <div class="border-b border-dark-border pb-4 mb-6"><legend class="text-lg font-semibold text-white">Dates and Status</legend></div>
                    <div class="space-y-6">
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label class="font-semibold text-gray-400 md:text-right">Joining date:</label>
                            <div class="md:col-span-3 flex items-center gap-3"><input type="date" id="joining-date" class="w-full max-w-xs py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"><button type="button" onclick="document.getElementById('joining-date').valueAsDate = new Date()" class="text-primary hover:underline text-sm font-semibold">Today</button></div>
                        </div>
                         <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label class="font-semibold text-gray-400 md:text-right">Resignation date:</label>
                            <div class="md:col-span-3 flex items-center gap-3"><input type="date" id="resignation-date" class="w-full max-w-xs py-2 px-3 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"><button type="button" onclick="document.getElementById('resignation-date').valueAsDate = new Date()" class="text-primary hover:underline text-sm font-semibold">Today</button></div>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-center">
                            <label class="font-semibold text-gray-400 md:text-right">Status:</label>
                            <div class="md:col-span-3"><select class="w-full max-w-xs px-3 py-2 border border-dark-border bg-dark-bg rounded-lg outline-none focus:ring-2 focus:ring-primary"><option>Active</option><option>Inactive</option></select></div>
                        </div>
                    </div>
                 </fieldset>
                
                <!-- Action Buttons -->
                 <div class="p-4 bg-dark-card/50 rounded-b-2xl flex flex-wrap gap-4 items-center border-t border-dark-border">
                    <button class="px-5 py-2 bg-primary text-white text-sm font-semibold rounded-lg hover:bg-primary-dark transition-colors">SAVE</button>
                    <button class="px-5 py-2 bg-dark-border text-white text-sm font-semibold rounded-lg hover:bg-dark-border/70 transition-colors">Save and add another</button>
                    <button class="px-5 py-2 bg-dark-border text-white text-sm font-semibold rounded-lg hover:bg-dark-border/70 transition-colors">Save and continue editing</button>
                </div>
             </div>
        </main>
    </div>
</div>

  <script>
        lucide.createIcons();

        // --- FULLY FUNCTIONAL SCRIPT BLOCK ---
        function toggleDropdown(panelId, iconId) {
            const panel = document.getElementById(panelId);
            const icon = document.getElementById(iconId);
            panel.classList.toggle('hidden');
            if (panel.classList.contains('hidden')) {
                icon.style.transform = 'rotate(0deg)';
            } else {
                icon.style.transform = 'rotate(180deg)';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const sidebar = document.getElementById('sidebar');
            const openSidebarBtn = document.getElementById('open-sidebar-btn');
            const closeSidebarBtn = document.getElementById('close-sidebar-btn');
            const sidebarOverlay = document.getElementById('sidebar-overlay');
            
            const activeClass = "bg-gradient-to-r from-primary to-orange-500 text-white font-semibold rounded-lg shadow-lg";
            const inactiveClass = "text-gray-400 hover:text-white rounded-lg transition-colors";
            const activeSubClass = "text-primary font-semibold";
            const inactiveSubClass = "text-gray-400 hover:text-white";
            let currentPage = window.location.pathname.split('/').pop() || 'admindashboard.html';

            if (openSidebarBtn) {
                const openSidebar = () => { sidebar.classList.remove('-translate-x-full'); sidebarOverlay.classList.remove('hidden'); };
                const closeSidebar = () => { sidebar.classList.add('-translate-x-full'); sidebarOverlay.classList.add('hidden'); };
                openSidebarBtn.addEventListener('click', openSidebar);
                closeSidebarBtn.addEventListener('click', closeSidebar);
                sidebarOverlay.addEventListener('click', closeSidebar);
            }

            // Set Active Menu Items Dynamically
            const sidebarLinks = sidebar.querySelectorAll('a');
            sidebarLinks.forEach(link => {
                const href = link.getAttribute('href');
                if (href && href.includes(currentPage) && currentPage !== '') {
                    const panel = link.closest('div[id$="-panel"]');
                    if (panel) {
                        link.className = link.className.replace(inactiveSubClass, activeSubClass);
                        panel.classList.remove('hidden');
                        const btn = panel.previousElementSibling;
                        if (btn) {
                            btn.className = btn.className.replace(inactiveClass, activeClass);
                            const icon = btn.querySelector('i[id$="-icon"]');
                            if (icon) icon.style.transform = 'rotate(180deg)';
                        }
                    } else {
                        link.className = link.className.replace(inactiveClass, activeClass);
                    }
                }
            });
        });
    </script>
</body>
</html>
